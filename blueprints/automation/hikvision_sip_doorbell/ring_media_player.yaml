blueprint:
  name: Hikvision Doorbell — Ring media player
  description: >
    Play a sound on one or more media players when the Hikvision doorbell rings,
    repeating until the call ends or a maximum duration is reached.
    Optionally use a TTS message instead of a sound file.
  domain: automation
  input:
    call_state_sensor:
      name: Call state sensor
      description: The "Call State" sensor created by the Hikvision SIP Doorbell integration.
      selector:
        entity:
          integration: hikvision_sip_doorbell
          domain: sensor

    media_players:
      name: Media player(s)
      description: One or more media players to ring (e.g. Google Home Mini, Sonos).
      selector:
        entity:
          domain: media_player
          multiple: true

    volume:
      name: Volume
      description: Playback volume (0.0 – 1.0).
      default: 0.5
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider

    repeat_interval:
      name: Repeat interval (seconds)
      description: How many seconds to wait between each ring. Should be longer than the sound duration.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: s

    max_duration:
      name: Maximum duration (seconds)
      description: Stop ringing after this many seconds even if the call is still active.
      default: 60
      selector:
        number:
          min: 5
          max: 300
          step: 5
          unit_of_measurement: s

    use_tts:
      name: Use TTS instead of sound file
      description: >
        If enabled, speak a message instead of playing an MP3.
        The sound URL below will be ignored.
      default: false
      selector:
        boolean:

    tts_engine:
      name: TTS engine
      description: The TTS engine entity to use for speaking the message.
      selector:
        entity:
          domain: tts

    tts_message:
      name: TTS message
      description: Text to speak when "Use TTS" is enabled.
      default: "Qualcuno al cancello"
      selector:
        text:

    sound_url:
      name: Sound URL
      description: >
        URL of the MP3/WAV file to play. Must be reachable by the media player.
        Use a local path like /local/doorbell.mp3 (place the file in config/www/)
        or a public URL. Ignored if "Use TTS" is enabled.
      default: "https://www.1800doorbell.com/wp-content/uploads/sounds/ERA-1-Sound-Ding-Dong.mp3"
      selector:
        text:

variables:
  use_tts: !input use_tts
  tts_engine: !input tts_engine
  tts_message: !input tts_message
  sound_url: !input sound_url
  max_duration: !input max_duration
  repeat_interval: !input repeat_interval

trigger:
  - platform: state
    entity_id: !input call_state_sensor
    to: ringing
    id: ringing
  - platform: state
    entity_id: !input call_state_sensor
    from: ringing
    id: stop

action:
  - choose:
      - conditions:
          - condition: trigger
            id: ringing
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: !input media_players
            data:
              volume_level: !input volume
          - repeat:
              while:
                - condition: state
                  entity_id: !input call_state_sensor
                  state: ringing
                - condition: template
                  value_template: "{{ repeat.index * repeat_interval <= max_duration }}"
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ use_tts }}"
                      sequence:
                        - service: tts.speak
                          data:
                            entity_id: "{{ tts_engine }}"
                            media_player_entity_id: !input media_players
                            message: "{{ tts_message }}"
                  default:
                    - service: media_player.play_media
                      target:
                        entity_id: !input media_players
                      data:
                        media_content_type: music
                        media_content_id: "{{ sound_url }}"
                - delay:
                    seconds: "{{ repeat_interval }}"

      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - service: media_player.media_stop
            target:
              entity_id: !input media_players

mode: restart
